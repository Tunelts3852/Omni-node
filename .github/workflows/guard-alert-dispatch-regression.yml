name: guard-alert-dispatch-regression

on:
  workflow_dispatch:
  schedule:
    - cron: "10 * * * *"

jobs:
  guard-alert-dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 준비
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: .NET SDK 준비
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Gemini 키 secure_file_600 구성
        env:
          GEMINI_KEY_SECURE_FILE_CONTENT: ${{ secrets.OMNINODE_GEMINI_API_KEY_SECURE_FILE_CONTENT }}
        run: |
          set -euo pipefail
          if [[ -n "${OMNINODE_GEMINI_API_KEY:-}" ]]; then
            echo "정책 위반: OMNINODE_GEMINI_API_KEY 직접 주입 금지"
            exit 1
          fi

          if [[ -z "${GEMINI_KEY_SECURE_FILE_CONTENT:-}" ]]; then
            echo "키 소스 검증 실패: OMNINODE_GEMINI_API_KEY_SECURE_FILE_CONTENT 미설정"
            exit 1
          fi

          mkdir -p "$HOME/.omni/keys"
          secure_file="$HOME/.omni/keys/gemini_api_key"
          printf '%s' "${GEMINI_KEY_SECURE_FILE_CONTENT}" > "$secure_file"
          chmod 600 "$secure_file"

          echo "OMNINODE_GEMINI_API_KEY_FILE=$secure_file" >> "$GITHUB_ENV"
          echo "GEMINI_KEY_SOURCE_POLICY=keychain|secure_file_600" >> "$GITHUB_ENV"

      - name: 키 소스 정책 검증
        run: |
          set -euo pipefail
          if [[ -n "${OMNINODE_GEMINI_API_KEY:-}" ]]; then
            echo "정책 위반: OMNINODE_GEMINI_API_KEY 직접 주입 감지"
            exit 1
          fi

          secure_file="${OMNINODE_GEMINI_API_KEY_FILE:-$HOME/.omni/keys/gemini_api_key}"
          if [[ ! -f "$secure_file" ]]; then
            echo "키 소스 검증 실패: secure_file 없음 ($secure_file)"
            exit 1
          fi

          mode="$(stat -c '%a' "$secure_file")"
          if [[ "$mode" != "600" ]]; then
            echo "키 소스 검증 실패: secure_file 권한은 600 이어야 함 (현재: $mode)"
            exit 1
          fi

          echo "key_source=secure_file_600"
          echo "key_source_policy=${GEMINI_KEY_SOURCE_POLICY}"
          echo "GEMINI_KEY_VALIDATED_SOURCE=secure_file_600" >> "$GITHUB_ENV"

      - name: mock 회귀 실행
        run: |
          set -euo pipefail
          artifact_dir="/tmp/guard-alert-regression"
          mkdir -p "$artifact_dir"

          mock_json="$artifact_dir/mock-regression.json"
          mock_console_log="$artifact_dir/mock-regression-console.log"

          {
            echo "[cmd] node omninode-middleware/check-guard-alert-dispatch.js --timeout-ms 30000 --dispatch-timeout-ms 900 --dispatch-max-attempts 1 --write $mock_json"
            node omninode-middleware/check-guard-alert-dispatch.js \
              --timeout-ms 30000 \
              --dispatch-timeout-ms 900 \
              --dispatch-max-attempts 1 \
              --write "$mock_json"
          } 2>&1 | tee "$mock_console_log"

      - name: live URL 회귀 실행 (설정된 경우)
        env:
          OMNINODE_GUARD_ALERT_WEBHOOK_URL: ${{ secrets.OMNINODE_GUARD_ALERT_WEBHOOK_URL }}
          OMNINODE_GUARD_ALERT_LOG_COLLECTOR_URL: ${{ secrets.OMNINODE_GUARD_ALERT_LOG_COLLECTOR_URL }}
        run: |
          set -euo pipefail
          artifact_dir="/tmp/guard-alert-regression"
          mkdir -p "$artifact_dir"

          live_json="$artifact_dir/live-regression.json"
          live_console_log="$artifact_dir/live-regression-console.log"

          if [[ -z "${OMNINODE_GUARD_ALERT_WEBHOOK_URL:-}" && -z "${OMNINODE_GUARD_ALERT_LOG_COLLECTOR_URL:-}" ]]; then
            echo "live URL 미설정: live 회귀 생략" | tee "$live_console_log"
            exit 0
          fi

          {
            echo "[cmd] node omninode-middleware/check-guard-alert-dispatch.js --skip-build --timeout-ms 30000 --dispatch-timeout-ms 900 --dispatch-max-attempts 1 --include-live-targets --write $live_json"
            node omninode-middleware/check-guard-alert-dispatch.js \
              --skip-build \
              --timeout-ms 30000 \
              --dispatch-timeout-ms 900 \
              --dispatch-max-attempts 1 \
              --include-live-targets \
              --write "$live_json"
          } 2>&1 | tee "$live_console_log"

      - name: 실행 메타 작성
        if: always()
        run: |
          set -euo pipefail
          artifact_dir="/tmp/guard-alert-regression"
          mkdir -p "$artifact_dir"

          node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const artifactDir = "/tmp/guard-alert-regression";
          const files = {
            mockJson: path.join(artifactDir, "mock-regression.json"),
            mockConsoleLog: path.join(artifactDir, "mock-regression-console.log"),
            liveJson: path.join(artifactDir, "live-regression.json"),
            liveConsoleLog: path.join(artifactDir, "live-regression-console.log"),
            manifest: path.join(artifactDir, "execution-manifest.json")
          };

          const readText = (filePath) => (fs.existsSync(filePath) ? fs.readFileSync(filePath, "utf8") : "");
          const liveLog = readText(files.liveConsoleLog);

          let liveRunStatus = "not_run";
          if (fs.existsSync(files.liveJson)) {
            liveRunStatus = "executed";
          } else if (liveLog.includes("live URL 미설정: live 회귀 생략")) {
            liveRunStatus = "skipped_no_live_urls";
          } else if (liveLog.trim().length > 0) {
            liveRunStatus = "failed_before_json";
          }

          const report = {
            workflow: "guard-alert-dispatch-regression",
            generatedAtUtc: new Date().toISOString(),
            keySourcePolicy: process.env.GEMINI_KEY_SOURCE_POLICY || "keychain|secure_file_600",
            keySource: process.env.GEMINI_KEY_VALIDATED_SOURCE || "unknown",
            geminiKeyRequiredFor: ["test", "validation", "regression", "production_run"],
            runs: {
              mock: fs.existsSync(files.mockJson) ? "executed" : "missing_json",
              live: liveRunStatus
            },
            artifacts: {
              mockJson: fs.existsSync(files.mockJson),
              mockConsoleLog: fs.existsSync(files.mockConsoleLog),
              liveJson: fs.existsSync(files.liveJson),
              liveConsoleLog: fs.existsSync(files.liveConsoleLog)
            }
          };

          fs.writeFileSync(files.manifest, `${JSON.stringify(report, null, 2)}\n`, "utf8");
          console.log(JSON.stringify(report, null, 2));
          NODE

      - name: 회귀 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guard-alert-dispatch-regression
          path: /tmp/guard-alert-regression/*
          retention-days: 14
          if-no-files-found: error
