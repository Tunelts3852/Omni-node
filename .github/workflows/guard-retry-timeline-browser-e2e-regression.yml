name: guard-retry-timeline-browser-e2e-regression

on:
  workflow_dispatch:
  schedule:
    - cron: "25 * * * *"

jobs:
  guard-retry-timeline-browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 준비
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: .NET SDK 준비
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Gemini 키 secure_file_600 구성
        env:
          GEMINI_KEY_SECURE_FILE_CONTENT: ${{ secrets.OMNINODE_GEMINI_API_KEY_SECURE_FILE_CONTENT }}
        run: |
          set -euo pipefail
          if [[ -n "${OMNINODE_GEMINI_API_KEY:-}" ]]; then
            echo "정책 위반: OMNINODE_GEMINI_API_KEY 직접 주입 금지"
            exit 1
          fi

          if [[ -z "${GEMINI_KEY_SECURE_FILE_CONTENT:-}" ]]; then
            echo "키 소스 검증 실패: OMNINODE_GEMINI_API_KEY_SECURE_FILE_CONTENT 미설정"
            exit 1
          fi

          mkdir -p "$HOME/.omni/keys"
          secure_file="$HOME/.omni/keys/gemini_api_key"
          printf '%s' "${GEMINI_KEY_SECURE_FILE_CONTENT}" > "$secure_file"
          chmod 600 "$secure_file"

          echo "OMNINODE_GEMINI_API_KEY_FILE=$secure_file" >> "$GITHUB_ENV"
          echo "GEMINI_KEY_SOURCE_POLICY=keychain|secure_file_600" >> "$GITHUB_ENV"

      - name: 키 소스 정책 검증
        run: |
          set -euo pipefail
          if [[ -n "${OMNINODE_GEMINI_API_KEY:-}" ]]; then
            echo "정책 위반: OMNINODE_GEMINI_API_KEY 직접 주입 감지"
            exit 1
          fi

          secure_file="${OMNINODE_GEMINI_API_KEY_FILE:-$HOME/.omni/keys/gemini_api_key}"
          if [[ ! -f "$secure_file" ]]; then
            echo "키 소스 검증 실패: secure_file 없음 ($secure_file)"
            exit 1
          fi

          mode="$(stat -c '%a' "$secure_file")"
          if [[ "$mode" != "600" ]]; then
            echo "키 소스 검증 실패: secure_file 권한은 600 이어야 함 (현재: $mode)"
            exit 1
          fi

          echo "key_source=secure_file_600"
          echo "key_source_policy=${GEMINI_KEY_SOURCE_POLICY}"
          echo "gemini_key_required_for=test,validation,regression,production_run"
          echo "GEMINI_KEY_VALIDATED_SOURCE=secure_file_600" >> "$GITHUB_ENV"

      - name: Node 모듈 설치
        run: npm ci

      - name: Playwright Chromium 준비
        run: npx playwright install --with-deps chromium

      - name: 미들웨어 빌드 (E2E 사전 준비)
        run: dotnet build omninode-middleware/OmniNode.Middleware.csproj

      - name: retry 시계열 브라우저 E2E 회귀 실행
        run: |
          set -euo pipefail
          artifact_dir="/tmp/guard-retry-timeline-browser-e2e-regression"
          mkdir -p "$artifact_dir"

          console_log="$artifact_dir/browser-e2e-console.log"
          stderr_log="$artifact_dir/browser-e2e-stderr.log"
          json_report="$artifact_dir/browser-e2e-result.json"
          p3_smoke_json="$artifact_dir/p3-guard-smoke.json"
          sample_readiness_json="$artifact_dir/guard-sample-readiness.json"
          bundle_json="$artifact_dir/p7-failclosed-countlock-bundle.json"

          {
            echo "[cmd] node --check omninode-dashboard/check-guard-retry-timeline-browser-e2e.js"
            node --check omninode-dashboard/check-guard-retry-timeline-browser-e2e.js
            echo "[cmd] node --check omninode-dashboard/check-guard-threshold-lock.js"
            node --check omninode-dashboard/check-guard-threshold-lock.js
            echo "[cmd] node omninode-dashboard/check-guard-threshold-lock.js"
            node omninode-dashboard/check-guard-threshold-lock.js
          } 2>&1 | tee "$console_log"

          echo "[cmd] node omninode-dashboard/check-guard-retry-timeline-browser-e2e.js" | tee -a "$console_log"

          set +e
          node omninode-dashboard/check-guard-retry-timeline-browser-e2e.js > "$json_report" 2> "$stderr_log"
          run_status=$?
          set -e

          cat "$json_report" | tee -a "$console_log"
          if [[ -s "$stderr_log" ]]; then
            cat "$stderr_log" | tee -a "$console_log"
          else
            rm -f "$stderr_log"
          fi

          if [[ $run_status -ne 0 ]]; then
            echo "브라우저 E2E 회귀 실패 (exit=$run_status)" | tee -a "$console_log"
            exit "$run_status"
          fi

          echo "[cmd] node omninode-middleware/check-p3-guard-smoke.js --skip-build --attempts 6 --timeout-ms 45000 --guard-retry-timeline-state-path .runtime/loop43-guard-retry-timeline-browser-e2e/guard_retry_timeline.json --write $p3_smoke_json" | tee -a "$console_log"
          node omninode-middleware/check-p3-guard-smoke.js \
            --skip-build \
            --attempts 6 \
            --timeout-ms 45000 \
            --guard-retry-timeline-state-path .runtime/loop43-guard-retry-timeline-browser-e2e/guard_retry_timeline.json \
            --write "$p3_smoke_json" | tee -a "$console_log"

          echo "[cmd] node omninode-dashboard/check-guard-sample-readiness.js --state-path .runtime/loop43-guard-retry-timeline-browser-e2e/guard_retry_timeline.json --enforce-ready --write $sample_readiness_json" | tee -a "$console_log"
          node omninode-dashboard/check-guard-sample-readiness.js \
            --state-path .runtime/loop43-guard-retry-timeline-browser-e2e/guard_retry_timeline.json \
            --enforce-ready \
            --write "$sample_readiness_json" | tee -a "$console_log"

          echo "[cmd] node omninode-dashboard/check-p7-fail-closed-count-lock-bundle.js --smoke-report $p3_smoke_json --timeline-state .runtime/loop43-guard-retry-timeline-browser-e2e/guard_retry_timeline.json --readiness-report $sample_readiness_json --enforce --write $bundle_json" | tee -a "$console_log"
          node omninode-dashboard/check-p7-fail-closed-count-lock-bundle.js \
            --smoke-report "$p3_smoke_json" \
            --timeline-state .runtime/loop43-guard-retry-timeline-browser-e2e/guard_retry_timeline.json \
            --readiness-report "$sample_readiness_json" \
            --enforce \
            --write "$bundle_json" | tee -a "$console_log"

      - name: 실행 메타 작성
        if: always()
        run: |
          set -euo pipefail
          artifact_dir="/tmp/guard-retry-timeline-browser-e2e-regression"
          mkdir -p "$artifact_dir"

          node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const artifactDir = "/tmp/guard-retry-timeline-browser-e2e-regression";
          const files = {
            consoleLog: path.join(artifactDir, "browser-e2e-console.log"),
            stderrLog: path.join(artifactDir, "browser-e2e-stderr.log"),
            resultJson: path.join(artifactDir, "browser-e2e-result.json"),
            p3GuardSmokeJson: path.join(artifactDir, "p3-guard-smoke.json"),
            sampleReadinessJson: path.join(artifactDir, "guard-sample-readiness.json"),
            failClosedCountLockBundleJson: path.join(artifactDir, "p7-failclosed-countlock-bundle.json"),
            manifest: path.join(artifactDir, "execution-manifest.json")
          };

          const report = {
            workflow: "guard-retry-timeline-browser-e2e-regression",
            generatedAtUtc: new Date().toISOString(),
            keySourcePolicy: process.env.GEMINI_KEY_SOURCE_POLICY || "keychain|secure_file_600",
            keySource: process.env.GEMINI_KEY_VALIDATED_SOURCE || "unknown",
            geminiKeyRequiredFor: ["test", "validation", "regression", "production_run"],
            run: fs.existsSync(files.resultJson) ? "executed" : "missing_json",
            artifacts: {
              resultJson: fs.existsSync(files.resultJson),
              consoleLog: fs.existsSync(files.consoleLog),
              stderrLog: fs.existsSync(files.stderrLog),
              p3GuardSmokeJson: fs.existsSync(files.p3GuardSmokeJson),
              sampleReadinessJson: fs.existsSync(files.sampleReadinessJson),
              failClosedCountLockBundleJson: fs.existsSync(files.failClosedCountLockBundleJson)
            }
          };

          fs.writeFileSync(files.manifest, `${JSON.stringify(report, null, 2)}\n`, "utf8");
          console.log(JSON.stringify(report, null, 2));
          NODE

      - name: 회귀 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guard-retry-timeline-browser-e2e-regression
          path: /tmp/guard-retry-timeline-browser-e2e-regression/*
          retention-days: 14
          if-no-files-found: error
